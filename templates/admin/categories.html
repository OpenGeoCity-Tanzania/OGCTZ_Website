{% extends "admin/base.html" %}

{% block content %}
<div class="flex items-center justify-between mb-8">
    <div>
        <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Categories</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-1">Organize blog posts by topic.</p>
    </div>
</div>

<div class="grid lg:grid-cols-3 gap-8">
    <div class="lg:col-span-1">
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-6">
            <h2 class="text-lg font-bold text-slate-900 dark:text-white mb-4">New Category</h2>
            <form method="POST" action="{{ url_for('admin_category_new') }}" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-brand-primary focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Description</label>
                    <textarea name="description" rows="3" class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-white text-sm focus:ring-2 focus:ring-brand-primary focus:border-transparent"></textarea>
                </div>
                <button type="submit" class="w-full px-6 py-2.5 bg-brand-primary hover:bg-sky-600 text-white font-semibold rounded-lg transition shadow">Create Category</button>
            </form>
        </div>
    </div>

    <div class="lg:col-span-2">
        <div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-slate-50 dark:bg-slate-700 text-slate-500 dark:text-slate-400">
                        <tr>
                            <th class="px-6 py-3 font-medium">Name</th>
                            <th class="px-6 py-3 font-medium">Slug</th>
                            <th class="px-6 py-3 font-medium">Posts</th>
                            <th class="px-6 py-3 font-medium text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-200 dark:divide-slate-700">
                        {% for cat in categories %}
                        <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition">
                            <td class="px-6 py-4 font-medium text-slate-900 dark:text-white">
                                <a href="{{ url_for('blog_category', slug=cat.slug) }}" target="_blank" class="text-brand-primary hover:underline">{{ cat.name }}</a>
                            </td>
                            <td class="px-6 py-4 text-slate-600 dark:text-slate-300">/{{ cat.slug }}</td>
                            <td class="px-6 py-4 text-slate-600 dark:text-slate-300">{{ cat.posts | length }}</td>
                            <td class="px-6 py-4 text-right">
                                <form action="{{ url_for('admin_category_delete', cat_id=cat.id) }}" method="POST" class="inline" onsubmit="return confirm('Delete this category?')">
                                    <button type="submit" class="text-red-500 hover:text-red-600 font-medium">Delete</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="4" class="px-6 py-10 text-center text-slate-500 dark:text-slate-400">
                                No categories yet.
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
