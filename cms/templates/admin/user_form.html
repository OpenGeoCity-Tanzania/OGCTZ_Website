{% extends "admin/base.html" %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-900 dark:text-white">{{ page_title }}</h1>
    <p class="text-slate-500 dark:text-slate-400 mt-1">
        {% if user %}Editing {{ user.username }}{% else %}Create a new admin user{% endif %}
    </p>
</div>

<div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-6 lg:p-8 max-w-2xl">
    <form method="POST" class="space-y-6">
        <!-- Username -->
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Username</label>
            <input type="text" name="username" required {% if user %}readonly{% endif %}
                   value="{{ user.username if user else '' }}"
                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-brand-primary focus:border-transparent {% if user %}opacity-60 cursor-not-allowed{% endif %}">
            {% if user %}<p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Usernames cannot be changed.</p>{% endif %}
        </div>

        <!-- Email -->
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email</label>
            <input type="email" name="email"
                   value="{{ user.email if user else '' }}"
                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-brand-primary focus:border-transparent">
        </div>

        <!-- Role -->
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Role</label>
            <select name="role" required
                    class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-brand-primary focus:border-transparent">
                <option value="editor" {% if user and user.role == 'editor' %}selected{% endif %}>Editor — can manage blog, images, and content</option>
                <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Admin — can manage all CMS content</option>
                <option value="superadmin" {% if user and user.role == 'superadmin' %}selected{% endif %}>Superadmin — full access including user management</option>
            </select>
        </div>

        <!-- Active -->
        {% if user %}
        <div class="flex items-center gap-2">
            <input type="checkbox" id="is_active" name="is_active" {% if user.is_active %}checked{% endif %} class="w-4 h-4 text-brand-primary rounded focus:ring-brand-primary">
            <label for="is_active" class="text-sm font-medium text-slate-700 dark:text-slate-300">Account active</label>
        </div>
        {% endif %}

        <!-- Password -->
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">
                {% if user %}New Password (leave blank to keep current){% else %}Password{% endif %}
            </label>
            <input type="password" name="password" {% if not user %}required{% endif %} minlength="6"
                   class="w-full px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-brand-primary focus:border-transparent">
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Minimum 6 characters.</p>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-4 pt-2">
            <button type="submit" class="px-6 py-2.5 bg-brand-primary hover:bg-sky-600 text-white font-semibold rounded-lg transition shadow">
                {% if user %}Update User{% else %}Create User{% endif %}
            </button>
            <a href="{{ url_for('admin.admin_users') }}" class="px-6 py-2.5 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white font-medium transition">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
