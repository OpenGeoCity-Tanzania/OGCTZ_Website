{% extends "admin/base.html" %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-slate-900 dark:text-white">Edit Content</h1>
    <p class="text-slate-500 dark:text-slate-400 mt-1">{{ item.label }} <span class="text-slate-400">({{ item.page }} / {{ item.key }})</span></p>
</div>

<div class="bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm p-6 lg:p-8">
    <form method="POST" class="space-y-6">
        <!-- Content Type -->
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Content Type</label>
            <select name="content_type" class="w-full md:w-64 px-4 py-2.5 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-brand-primary">
                <option value="text" {% if item.content_type == 'text' %}selected{% endif %}>Plain Text</option>
                <option value="html" {% if item.content_type == 'html' %}selected{% endif %}>HTML</option>
                <option value="markdown" {% if item.content_type == 'markdown' %}selected{% endif %}>Markdown</option>
            </select>
        </div>

        <!-- Content -->
        <div>
            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Content</label>
            <textarea name="content" rows="16" required
                      class="w-full px-4 py-3 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900 text-slate-900 dark:text-white font-mono text-sm focus:ring-2 focus:ring-brand-primary focus:border-transparent">{{ item.content }}</textarea>
        </div>

        <!-- Actions -->
        <div class="flex items-center gap-4 pt-2">
            <button type="submit" class="px-6 py-2.5 bg-brand-primary hover:bg-sky-600 text-white font-semibold rounded-lg transition shadow">
                Save Changes
            </button>
            <a href="{{ url_for('admin.admin_content') }}" class="px-6 py-2.5 text-slate-600 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white font-medium transition">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
